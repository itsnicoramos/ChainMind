<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <!-- Chain link outer ring -->
  <rect x="4" y="11" width="10" height="10" rx="5" stroke="#00e5ff" stroke-width="2.5" fill="none"/>
  <rect x="18" y="11" width="10" height="10" rx="5" stroke="#00e5ff" stroke-width="2.5" fill="none"/>
  <!-- Link connectors -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neural pulse dot -->
  <circle cx="16" cy="16" r="2.5" fill="#00e5ff" opacity="0.9"/>
</svg>
