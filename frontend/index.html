<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainMind</title>
  <meta name="description" content="Your blockchain, with a brain. AI-native blockchain platform.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar Navigation -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <a href="#/dashboard" class="logo-link">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="10" width="11" height="11" rx="5.5" stroke="currentColor" stroke-width="2.5" fill="none"/>
            <rect x="18" y="10" width="11" height="11" rx="5.5" stroke="currentColor" stroke-width="2.5" fill="none"/>
            <line x1="8.5" y1="15.5" x2="23.5" y2="15.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="16" cy="15.5" r="2" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-wordmark">ChainMind</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-label">Chain</span>
      <a href="#/dashboard" class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#/wallet" class="nav-item" data-view="wallet">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 8h16" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="14" cy="12" r="1.5" fill="currentColor"/>
          <path d="M6 3l4-1 4 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Wallet</span>
      </a>
      <a href="#/miner" class="nav-item" data-view="miner">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2L12.5 7H17.5L13.5 10.5L15 16L10 13L5 16L6.5 10.5L2.5 7H7.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>Miner</span>
      </a>
      <a href="#/network" class="nav-item" data-view="network">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="3.5" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="16.5" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="3.5" cy="15" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="16.5" cy="15" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="8" y1="9" x2="5" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="9" x2="15" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8" y1="11" x2="5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="11" x2="15" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Network</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-label">Agent</span>
      <a href="#/agent" class="nav-item" data-view="agent">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v9a1 1 0 01-1 1H7l-4 3V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="7" cy="9" r="1" fill="currentColor"/>
          <circle cx="10" cy="9" r="1" fill="currentColor"/>
          <circle cx="13" cy="9" r="1" fill="currentColor"/>
        </svg>
        <span>Agent Chat</span>
      </a>
      <a href="#/automation" class="nav-item" data-view="automation">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Automation</span>
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="node-selector-wrap">
        <label class="node-selector-label">Node</label>
        <div class="node-selector-input">
          <span class="node-status-dot connected"></span>
          <input type="text" id="node-url-input" value="localhost:8000" placeholder="backend URL" spellcheck="false">
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <svg class="icon-sun" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 20 20" fill="none">
          <path d="M17 12.5A7 7 0 117.5 3a5 5 0 009.5 9.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="content">
    <!-- Views render here -->
  </main>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal-backdrop"></div>
    <div id="modal-container"></div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-nav">
    <a href="#/dashboard" class="mobile-nav-item" data-view="dashboard">
      <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
      <span>Chain</span>
    </a>
    <a href="#/wallet" class="mobile-nav-item" data-view="wallet">
      <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 8h16" stroke="currentColor" stroke-width="1.5"/><circle cx="14" cy="12" r="1.5" fill="currentColor"/></svg>
      <span>Wallet</span>
    </a>
    <a href="#/miner" class="mobile-nav-item" data-view="miner">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7H17.5L13.5 10.5L15 16L10 13L5 16L6.5 10.5L2.5 7H7.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span>Mine</span>
    </a>
    <a href="#/agent" class="mobile-nav-item" data-view="agent">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v9a1 1 0 01-1 1H7l-4 3V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span>Agent</span>
    </a>
    <a href="#/automation" class="mobile-nav-item" data-view="automation">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Auto</span>
    </a>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
